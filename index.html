<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bio Page</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --accent-color: #007bff;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-color);
            margin-bottom: 1rem;
        }

        h1 { margin: 10px 0 5px; font-size: 1.8rem; }
        p { color: #666; margin-bottom: 20px; line-height: 1.5; }

        .links { display: flex; flex-direction: column; gap: 12px; }

        .link-btn {
            text-decoration: none;
            background: var(--accent-color);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        .link-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.postimg.cc/RFYXrXBd/Screenshot-2026-05-14-174816.png" alt="Profile Picture" class="profile-pic">
        
        <h1>SonicstudiosMB</h1>
        <p>Hi im Sonic and i like to make games in roblox specifically elevators but i never make it public because of all the shit that is happening</p>

        <div class="links">
            <a href="https://www.youtube.com/@RealSonicstudiosMB" class="link-btn">YouTube</a>
            <a href="https://www.roblox.com/users/1474677068/profile" class="link-btn">Roblox</a>
            <a href="mailto:sonicstudiosmb@ssmb.dev" class="link-btn">Contact Me</a>
        </div>
    </div>

</body>
</html>
